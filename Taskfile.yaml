version: "3"

env:
  GOCACHE: '{{.TASKFILE_DIR}}/.cache/go-build'

tasks:
  default:
    desc: Run the full local quality gate
    deps:
      - ci

  ci:
    desc: Run tests, coverage, lint, and security checks
    deps:
      - test-race
      - coverage
      - lint
      - security

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test-race:
    desc: Run race tests
    cmds:
      - go test -race ./...

  test:integration:
    desc: Run provider integration tests
    deps:
      - test:integration:codex
      - test:integration:opencode

  test:integration:codex:
    desc: Run Codex ACP integration tests
    cmds:
      - go test -tags 'integration codex' ./...

  test:integration:opencode:
    desc: Run OpenCode ACP integration tests
    cmds:
      - go test -tags 'integration opencode' ./...

  coverage:
    desc: Run coverage checks
    cmds:
      - go test . ./acperror -coverprofile=coverage.out
      - awk -v coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')" 'BEGIN { if (coverage < 95.0) exit 1 }'

  install-tools:
    desc: Install pinned local tools
    cmds:
      - GOBIN="$PWD/.bin" go -C tools install github.com/golangci/golangci-lint/v2/cmd/golangci-lint
      - GOBIN="$PWD/.bin" go -C tools install golang.org/x/vuln/cmd/govulncheck
    sources:
      - tools/go.mod
      - tools/go.sum
    generates:
      - .bin/golangci-lint
      - .bin/govulncheck

  lint:
    desc: Run golangci-lint
    deps:
      - install-tools
    cmds:
      - ./.bin/golangci-lint run ./...

  security:
    desc: Run module verification and govulncheck
    deps:
      - install-tools
    cmds:
      - go mod download
      - go mod verify
      - ./.bin/govulncheck ./...
    dir: '{{.TASKFILE_DIR}}'

  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy
      - go -C tools mod tidy
