name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Install tools
        run: |
          GOBIN="$PWD/.bin" go -C tools install github.com/golangci/golangci-lint/v2/cmd/golangci-lint
          GOBIN="$PWD/.bin" go -C tools install golang.org/x/vuln/cmd/govulncheck
      - name: Test
        run: |
          go test -race ./...
      - name: Coverage
        run: |
          go test . ./acperror -coverprofile=coverage.out
          coverage="$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')"
          awk -v coverage="$coverage" 'BEGIN { if (coverage < 95.0) exit 1 }'
      - name: Lint
        run: |
          ./.bin/golangci-lint run ./...
      - name: Security
        run: |
          ./scripts/govulncheck-reachable.sh
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
